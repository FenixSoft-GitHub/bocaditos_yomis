<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sin conexión — Bocaditos Yomi's</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #0c0905;
        color: #fff5e4;
        font-family: Inter, system-ui, sans-serif;
        text-align: center;
        padding: 2rem;
        gap: 1.5rem;
      }
      img {
        width: 100px;
        opacity: 0.9;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: #ffd700;
      }
      p {
        font-size: 1rem;
        color: #c39b77;
        max-width: 360px;
        line-height: 1.6;
      }
      a {
        display: inline-block;
        margin-top: 0.5rem;
        padding: 0.75rem 2rem;
        border-radius: 9999px;
        background: #6b4226;
        color: #fff5e4;
        font-weight: 600;
        text-decoration: none;
        transition: background 0.2s;
      }
      a:hover {
        background: #c39b77;
      }
    </style>
  </head>
  <body>
    <img src="/LogoBocaditosYomis.avif" alt="Logo Bocaditos Yomi's" />
    <h1>Sin conexión</h1>
    <p>
      Parece que no tienes acceso a internet en este momento. Vuelve cuando
      tengas conexión y te esperamos con los bocaditos frescos 🍞
    </p>
    <a href="/">Intentar de nuevo</a>
  </body>
</html>
