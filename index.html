<!doctype html>
<html lang="es">
  <head>
    <script>
      (function () {
        const theme = localStorage.getItem("theme");
        if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <style>
      html.dark body { background-color: #0c0905; color: #fff5e4; }
    </style>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/icons/site.webmanifest" />
    <meta name="theme-color" content="#6b4226" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Yomi's" />

    <!-- SEO base -->
    <title>Bocaditos Yomi's — Snacks y Golosinas Artesanales</title>
    <meta name="description" content="Bocaditos Yomi's: la mejor selección de snacks, golosinas y bocaditos artesanales. Envíos a todo el país. ¡Descubre nuestros productos frescos y deliciosos!" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://bocaditosynomis.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bocaditos Yomi's" />
    <meta property="og:title" content="Bocaditos Yomi's — Snacks y Golosinas Artesanales" />
    <meta property="og:description" content="La mejor selección de snacks y bocaditos artesanales. Envíos a todo el país." />
    <meta property="og:image" content="https://bocaditosynomis.vercel.app/LogoBocaditosYomis.avif" />
    <meta property="og:url" content="https://bocaditosynomis.vercel.app/" />
    <meta property="og:locale" content="es_VE" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bocaditos Yomi's — Snacks y Golosinas Artesanales" />
    <meta name="twitter:description" content="La mejor selección de snacks y bocaditos artesanales. ¡Pide ahora!" />
    <meta name="twitter:image" content="https://bocaditosynomis.vercel.app/LogoBocaditosYomis.avif" />

    <!-- Preconnect fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
